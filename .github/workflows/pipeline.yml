name: CI - Tests, Docker and Security

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/jonyje/ecommerce-api

jobs:
  tests:
    name: Pruebas automáticas
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Ejecutar pruebas
        run: |
          python -m pytest -v

  docker-security:
    name: Docker y seguridad
    runs-on: ubuntu-latest
    needs:
      - tests

    steps:
      - name: Descargar código
        uses: actions/checkout@v7

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imagen Docker
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Reportar vulnerabilidades altas y críticas
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          scan-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          version: v0.72.0
          cache: false
          format: table
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Bloquear vulnerabilidades críticas
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          scan-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          skip-setup-trivy: true
          cache: false
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Iniciar sesión en GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar imagen Docker
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          docker tag "${IMAGE_NAME}:${GITHUB_SHA}" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:latest"
