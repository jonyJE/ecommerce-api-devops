version: '3.8'

services:
  # 1. Base de datos PostgreSQL
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: usuario_devops
      POSTGRES_PASSWORD: password_seguro
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"

  # 2. Nuestra API FastAPI
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Cumplimos la rúbrica: pasamos credenciales por variables de entorno
      - DB_CONNECTION=postgresql://usuario_devops:password_seguro@db:5432/ecommerce_db
    depends_on:
      - db

  # 3. Prometheus (Recolector de métricas)
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # 4. Grafana (Dashboard visual)
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
